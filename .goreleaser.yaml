version: 2

builds:
  - main: ./cmd/cc-session/
    binary: cc-session
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

# Fork tag (v0.1.58-configdir.1) has a hyphen; goreleaser prerelease:auto would
# mark it pre-release, which GitHub releases/latest (used by install.sh) skips.
release:
  prerelease: false
  make_latest: true

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
